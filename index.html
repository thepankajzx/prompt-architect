<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Architect | Premium Financial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkBase: '#09090b',
                        darkSurface: '#18181b',
                        darkBorder: '#27272a',
                        finGreen: '#16a34a',
                        finRed: '#dc2626',
                        finGold: '#ca8a04',
                        accent: '#2563eb'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #e4e4e7; }
        .gradient-text { background: linear-gradient(90deg, #16a34a, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-pattern { background-image: radial-gradient(#27272a 1px, transparent 1px); background-size: 20px 20px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        .nav-item.active { border-left: 3px solid #16a34a; background-color: rgba(22, 163, 74, 0.1); color: #fff; }
        .generator-card { transition: all 0.2s ease; }
        .generator-card:hover { transform: translateY(-3px); border-color: #3f3f46; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .generator-card.active { border-color: #16a34a; background-color: rgba(22, 163, 74, 0.05); }
        
        /* The prompt textarea is strictly hidden per requirements */
        #hidden-prompt-storage { display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden flex bg-darkBase text-zinc-300">

    <!-- Sidebar -->
    <aside class="w-64 bg-darkSurface border-r border-darkBorder flex flex-col z-20 shadow-2xl">
        <div class="h-16 flex items-center px-6 border-b border-darkBorder">
            <i class="fas fa-chart-pie text-finGreen text-xl mr-3"></i>
            <span class="font-bold text-lg tracking-tight text-white">Prompt <span class="text-finGreen">Architect</span></span>
        </div>
        
        <div class="p-4 text-xs font-semibold text-zinc-500 uppercase tracking-wider">Financial Domains</div>
        
        <nav class="flex-1 overflow-y-auto custom-scrollbar px-3 space-y-1" id="category-list">
            <!-- Categories injected here -->
        </nav>
        
        <div class="p-4 border-t border-darkBorder">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded bg-zinc-800 flex items-center justify-center border border-zinc-700">
                    <i class="fas fa-user-tie text-zinc-400"></i>
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-zinc-200">Pro Architect</p>
                    <p class="text-xs text-zinc-500">v2.0 Finance Edition</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-pattern">
        
        <!-- Topbar -->
        <header class="h-16 bg-darkSurface/90 backdrop-blur-sm border-b border-darkBorder flex items-center justify-between px-8 z-10">
            <div>
                <h1 class="text-xl font-semibold text-white" id="current-category-title">Select a Domain</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-xs font-medium px-3 py-1 bg-zinc-800 border border-zinc-700 rounded-full text-zinc-400">
                    <i class="fas fa-lock mr-1 text-finGold"></i> Prompts Secured
                </span>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div class="flex-1 flex overflow-hidden">
            
            <!-- Generators Grid -->
            <div class="w-1/2 p-8 overflow-y-auto custom-scrollbar border-r border-darkBorder" id="generator-list">
                <!-- Generators injected here -->
            </div>

            <!-- Configuration Workspace -->
            <div class="w-1/2 p-8 overflow-y-auto custom-scrollbar flex flex-col relative">
                
                <!-- Empty State -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-zinc-500">
                    <i class="fas fa-project-diagram text-5xl mb-4 opacity-50"></i>
                    <p class="text-lg">Select a financial tool to configure.</p>
                </div>

                <!-- Config Form -->
                <div id="config-section" class="hidden flex-col h-full">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-white" id="current-generator-title">Tool Name</h2>
                        <span class="px-2 py-1 text-xs bg-accent/20 text-accent border border-accent/30 rounded" id="output-version-badge">v2.0</span>
                    </div>

                    <div class="bg-darkSurface border border-darkBorder rounded-xl p-6 mb-6 shadow-lg">
                        <h3 class="text-sm font-semibold text-zinc-400 uppercase tracking-wide mb-4 border-b border-darkBorder pb-2">AI Settings</h3>
                        <div class="grid grid-cols-2 gap-4 mb-2">
                            <div>
                                <label class="block text-xs font-medium text-zinc-400 mb-1">AI Model</label>
                                <select id="ai-model-select" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-finGreen">
                                    <option value="chatgpt">ChatGPT</option>
                                    <option value="claude">Claude</option>
                                    <option value="gemini">Gemini</option>
                                    <option value="perplexity">Perplexity</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-zinc-400 mb-1">AI Plan / Tier</label>
                                <select id="ai-plan-select" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-finGreen">
                                    <option value="free">Free Tier</option>
                                    <option value="pro">Pro / Advanced Tier</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mt-4 pt-4 border-t border-darkBorder">
                            <label class="block text-xs font-medium text-zinc-400 mb-1">Output Format</label>
                            <div class="flex space-x-4">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="output_format" value="text" checked class="text-finGreen focus:ring-finGreen bg-zinc-900 border-zinc-700">
                                    <span class="text-sm">Normal Text</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer relative group">
                                    <input type="radio" name="output_format" value="visual" class="text-finGreen focus:ring-finGreen bg-zinc-900 border-zinc-700">
                                    <span class="text-sm text-white font-medium">Visual (HTML) <i class="fas fa-bolt text-finGold ml-1"></i></span>
                                    
                                    <!-- Warning for Free Plan users trying to use Visual HTML -->
                                    <div id="free-plan-warning" class="hidden absolute top-full left-0 mt-2 w-64 bg-zinc-800 border border-finRed/50 p-2 rounded shadow-xl text-xs text-zinc-300 z-10">
                                        <i class="fas fa-exclamation-triangle text-finRed mr-1"></i>
                                        <strong>Recommended to use Normal Text.</strong> Free AI models often fail at complex HTML generation.
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="bg-darkSurface border border-darkBorder rounded-xl p-6 mb-8 flex-1 shadow-lg">
                        <h3 class="text-sm font-semibold text-zinc-400 uppercase tracking-wide mb-4 border-b border-darkBorder pb-2">Analysis Parameters</h3>
                        <form id="prompt-config-form" class="space-y-4">
                            <!-- Dynamic fields injected here -->
                        </form>
                    </div>

                    <!-- Hidden output for clipboard operations -->
                    <textarea id="hidden-prompt-storage" readonly></textarea>

                    <button id="generate-copy-btn" class="w-full bg-gradient-to-r from-finGreen to-emerald-600 hover:from-emerald-500 hover:to-finGreen text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(22,163,74,0.3)] transition-all transform hover:scale-[1.01] flex items-center justify-center space-x-3 text-lg">
                        <i class="fas fa-microchip"></i>
                        <span>Generate & Copy Prompt</span>
                    </button>
                    
                    <p class="text-center text-xs text-zinc-500 mt-4">
                        <i class="fas fa-shield-alt mr-1"></i> The engineered prompt is proprietary and will be copied directly to your clipboard.
                    </p>
                </div>

            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
