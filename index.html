<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Architect | Premium Prompt Engineering Workspace</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="workspace-container">
        
        <!-- Pane 1: Categories Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                </div>
                <h1>Prompt Architect</h1>
            </div>
            
            <nav class="category-nav">
                <div class="nav-section-title">Domains</div>
                <ul id="category-list">
                    <!-- Populated by JS -->
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <span class="version-tag">Engine v1.0.0</span>
            </div>
        </aside>

        <!-- Pane 2: Generators List -->
        <section class="generator-panel">
            <header class="panel-header">
                <h2 id="current-category-title">Select a Domain</h2>
            </header>
            
            <div class="generator-grid" id="generator-list">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Pane 3: Configuration & Output Workspace -->
        <main class="workspace-panel">
            <header class="panel-header workspace-header">
                <h2 id="current-generator-title">Workspace</h2>
                <div class="model-selector-container">
                    <select id="ai-model-select" class="premium-select">
                        <option value="chatgpt">ChatGPT</option>
                        <option value="claude">Claude</option>
                        <option value="gemini">Gemini</option>
                        <option value="perplexity">Perplexity</option>
                        <option value="grok">Grok</option>
                    </select>
                    <select id="ai-plan-select" class="premium-select">
                        <option value="free">Free Tier</option>
                        <option value="pro">Pro / Advanced Tier</option>
                    </select>
                </div>
            </header>

            <div class="workspace-content">
                
                <!-- Configuration Form -->
                <div class="config-section" id="config-section" style="display: none;">
                    <h3>Configuration Parameters</h3>
                    <form id="prompt-config-form" class="config-grid">
                        <!-- Populated dynamically based on generator -->
                    </form>
                    <button id="generate-btn" class="primary-btn">Architect Prompt</button>
                </div>

                <!-- Empty State -->
                <div id="empty-workspace-state" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    <p>Select a generator to begin engineering a prompt.</p>
                </div>

                <!-- Output Area -->
                <div class="output-section" id="output-section" style="display: none;">
                    <div class="output-header">
                        <h3>Engineered Output</h3>
                        <div class="output-actions">
                            <span class="version-badge" id="output-version-badge">v1.0</span>
                            <button id="copy-btn" class="secondary-btn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy Prompt
                            </button>
                        </div>
                    </div>
                    <div class="editor-container">
                        <textarea id="prompt-output" readonly placeholder="Your engineered prompt will appear here..."></textarea>
                    </div>
                    <div class="output-footer">
                        <p class="educational-notice">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                            Paste this prompt directly into your selected AI model.
                        </p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
